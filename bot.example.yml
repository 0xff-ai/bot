# Copy to .github/bot.yml in the consuming repo. Parsing is strict: unknown keys
# fail, so a typo surfaces loudly instead of being silently ignored.

# One-line product description fed to the changelog drafter.
product: omnifs, a projected filesystem that mirrors external services into local paths

# Logins whose `/changelog` always applies and whose pick wins over the author's.
maintainers:
  - raulk

# Changelog areas, in the order their `### <heading>` subsections appear in
# CHANGELOG.md. List only your product's user-facing areas; the bot appends its
# own `Internal & maintenance` area last for non-user-facing work (refactors,
# tests, CI, chores, deps, docs), so `internal` is reserved — don't define it.
# `aliases` let humans name an area loosely in `/changelog type(area): ...`.
areas:
  - id: providers
    heading: Providers & projected paths
    aliases: [provider, providers, projected paths, paths, routing, tree]
  - id: runtime
    heading: Runtime & mounts
    aliases: [runtime, daemon, omnifsd, mount, mounts, fuse, container]
  - id: cli
    heading: CLI & workflow
    aliases: [cli, command, commands, workflow, shell]
  - id: caching
    heading: Caching & performance
    aliases: [cache, caching, performance, perf, speed, memory]
  - id: auth
    heading: Auth & credentials
    aliases: [auth, authentication, credential, credentials, oauth, token, clone]
  - id: packaging
    heading: Packaging & release
    aliases: [packaging, package, npm, release, docker, image, ghcr, install]
